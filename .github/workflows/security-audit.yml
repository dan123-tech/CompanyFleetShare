name: Security audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Fail on critical vulnerabilities
        run: npm audit --audit-level=critical
